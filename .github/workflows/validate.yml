name: Validate

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    name: Validate plugin
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate manifest, skill, docs, and PowerShell syntax
        shell: pwsh
        run: .\scripts\Test-WindowsAppshotPlugin.ps1 -IncludeHotkeyValidation
